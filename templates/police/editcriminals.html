<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit criminal</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="/style.css">  
</head>
<body>
    <header>
        <h1>Edit Criminals</h1>
    </header>
    <div class="container">
        <h2>Edit criminal Details</h2>
        <form action="updatecriminal.php" method="POST">
            <!-- Hidden field for ID -->
            <input type="hidden" name="criminal_id" value="1"> <!-- Replace with dynamic ID -->
            
            <!-- Input fields -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="John Doe" required> <!-- Replace with dynamic data -->
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" value="30" required>
            
            <label for="skills">Skills:</label>
            <input type="text" id="skills" name="skills" value="Plumber" required>
            
            <label for="contact">Contact:</label>
            <input type="text" id="contact" name="contact" value="123-456-7890" required>
            
            <button type="submit">Update Criminal </button>
            <button type="button" class="cancel-button" onclick="window.location.href='viewlabours.html';">Cancel</button>
        </form>
        <a href="criminallistmanagement.html" class="back-link">Back to criminal List management</a>
    </div>
