<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Police Stations - Safe Kerala</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>Safe Kerala - Police Station Management</h1>
        <div>
            <nav>
            </nav>
        </div>
        <!-- Logout Button -->
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <main>
        <h2>Police Station Details</h2>
        
        <!-- Table to display police station records -->
        <table id="police-station-table">
            <thead>
                <tr>
                    <th>Station ID</th>
                    <th>Station Name</th>
                    <th>Location</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Sample row (Data will be dynamically loaded here) -->
                <tr>
                    <td>1</td>
                    <td>Central Police Station</td>
                    <td>Thiruvananthapuram</td>
                    <td>9876543210</td>
                    <td>
                        <button class="btn-edit" onclick="editRow(this)">Edit</button>
                        <button class="btn-delete" onclick="deleteRow(this)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <!-- Add button -->
        <button class="btn-add" onclick="addPoliceStation()">Add Police Station</button>
    </main>


    <script>
        // Function to add a new police station row
        function addPoliceStation() {
            const stationId = prompt("Enter Station ID:");
            const stationName = prompt("Enter Station Name:");
            const location = prompt("Enter Location:");
            const contact = prompt("Enter Contact Number:");
            
            if (stationId && stationName && location && contact) {
                const table = document.getElementById("police-station-table").getElementsByTagName('tbody')[0];
                const newRow = table.insertRow();

                newRow.innerHTML = `
                    <td>${stationId}</td>
                    <td>${stationName}</td>
                    <td>${location}</td>
                    <td>${contact}</td>
                    <td>
                        <button class="btn-edit" onclick="editRow(this)">Edit</button>
                        <button class="btn-delete" onclick="deleteRow(this)">Delete</button>
                    </td>
                `;
            } else {
                alert("All fields are required!");
            }
        }

        // Function to edit a police station row
        function editRow(button) {
            const row = button.parentNode.parentNode;
            const cells = row.getElementsByTagName("td");

            const newStationId = prompt("Edit Station ID:", cells[0].innerText);
            const newStationName = prompt("Edit Station Name:", cells[1].innerText);
            const newLocation = prompt("Edit Location:", cells[2].innerText);
            const newContact = prompt("Edit Contact Number:", cells[3].innerText);

            if (newStationId && newStationName && newLocation && newContact) {
                cells[0].innerText = newStationId;
                cells[1].innerText = newStationName;
                cells[2].innerText = newLocation;
                cells[3].innerText = newContact;
            } else {
                alert("All fields are required!");
            }
        }

        // Function to delete a police station row
        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            if (confirm("Are you sure you want to delete this record?")) {
                row.parentNode.removeChild(row);
            }
        }

        // Logout function
        function logout() {
            if (confirm("Are you sure you want to log out?")) {
                window.location.href = "login.html"; // Redirect to the login page
            }
        }
    </script>
</body>
</html>
